name: Build Status
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    name: Test / ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js lts/*
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: swift-actions/setup-swift@v2
        if: runner.os == 'Linux'
      - name: Configure git for private deps
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "git@github.com:"
      - run: npm install
      - run: npm test
      - run: npm run test:cross-language
